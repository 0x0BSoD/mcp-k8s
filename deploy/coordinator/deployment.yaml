apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-coordinator
  namespace: mcp-system
  labels:
    app: mcp-coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-coordinator
  template:
    metadata:
      labels:
        app: mcp-coordinator
    spec:
      containers:
        - name: coordinator
          image: mcp-coordinator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MCP_HTTP_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
