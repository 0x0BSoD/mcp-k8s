apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-cluster-agent
  namespace: mcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-cluster-agent
rules:
  # Watch and list Events — primary data source
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Snapshots and owner chain resolution
  - apiGroups: [""]
    resources: ["pods", "persistentvolumeclaims", "persistentvolumes", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-cluster-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mcp-cluster-agent
subjects:
  - kind: ServiceAccount
    name: mcp-cluster-agent
    namespace: mcp-system
