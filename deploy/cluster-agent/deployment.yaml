apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-cluster-agent
  namespace: mcp-system
  labels:
    app: mcp-cluster-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-cluster-agent
  template:
    metadata:
      labels:
        app: mcp-cluster-agent
    spec:
      serviceAccountName: mcp-cluster-agent
      containers:
        - name: agent
          image: ttl.sh/mcp-k8s/cluster-agent:1h
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: MCP_CLUSTER_NAME
              value: "minikube"          # override per cluster
            - name: MCP_GRPC_ADDR
              value: ":50051"
            - name: MCP_WATCH_NAMESPACE
              value: ""                   # empty = all namespaces
            - name: MCP_STORE_MAX_SIZE
              value: "10000"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
